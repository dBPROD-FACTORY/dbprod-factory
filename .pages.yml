# PagesCMS configuration — https://pagescms.org

links:
  - { label: "⬆ Upload média", href: "https://dbprod-factory.pages.dev/upload" }

media:
  input: public/media
  output: /media
  extensions:
    - jpg
    - jpeg
    - png
    - webp
    - gif
    - svg
    - mp3
    - wav
    - m4a
    - mp4

content:
  - name: site
    label: Réglages du site
    path: src/data/site.json
    type: file
    format: json
    fields:
      - { name: brand, label: Marque, type: string }
      - { name: brandShort, label: Logo court, type: string }
      - { name: tagline, label: Tagline, type: string }
      - { name: subline, label: Sous-logo, type: string }
      - { name: description, label: Description, type: text }
      - name: contact
        label: Contact
        type: object
        fields:
          - { name: address, label: Adresse, type: string }
          - { name: email, label: Email, type: string }
          - { name: phone, label: Téléphone, type: string }
      - name: social
        label: Réseaux sociaux
        type: object
        list: true
        fields:
          - { name: n, label: "Nom (instagram/facebook/linkedin)", type: string }
          - { name: u, label: URL, type: string }
      - name: clients
        label: Clients
        type: string
        list: true
      - name: stats
        label: Statistiques
        type: object
        list: true
        fields:
          - { name: v, label: Valeur, type: string }
          - { name: l, label: Libellé, type: string }
      - name: testimonials
        label: Témoignages
        type: object
        list: true
        fields:
          - { name: q, label: Citation, type: text }
          - { name: n, label: Nom, type: string }
          - { name: r, label: Rôle, type: string }
          - { name: seed, label: Seed (waveform), type: number }

  - name: home
    label: Page d'accueil
    path: src/data/home.json
    type: file
    format: json
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: onAir, label: On-Air, type: string }
          - { name: italic, label: Mot en italique, type: string }
          - { name: intro, label: Intro, type: text }
          - { name: cta1, label: CTA primaire, type: string }
          - { name: cta2, label: CTA secondaire, type: string }
      - name: samples
        label: Échantillons audio
        type: object
        list: true
        fields:
          - { name: title, label: Titre, type: string }
          - { name: artist, label: Légende, type: string }
          - { name: duration, label: Durée (sec), type: number }
          - { name: seed, label: Seed, type: number }
          - name: url
            label: "Chemin fichier audio"
            type: string
            description: "Ex: /media/samples/nom.mp3 — déposez le fichier via git"

  - name: services
    label: Services
    path: src/content/services
    type: collection
    format: yaml-frontmatter
    view:
      fields: [num, title, tag]
      primary: title
    fields:
      - { name: id, label: ID (slug), type: string }
      - { name: num, label: Numéro, type: string }
      - { name: title, label: Titre, type: string }
      - name: icon
        label: Icône
        type: select
        options:
          values: [mic, headphones, eye, subtitles, translate, megaphone, building, phone, clapper, globe, drone, camera, film]
      - { name: tag, label: Tag (optionnel), type: string, required: false }
      - { name: short, label: Description courte, type: text }
      - { name: long, label: Description longue, type: text }
      - name: facts
        label: Fiche technique
        type: object
        list: true
        fields:
          - { name: k, label: Clé, type: string }
          - { name: v, label: Valeur, type: string }
      - { name: order, label: Ordre, type: number }
      - { name: body, label: Contenu, type: text }

  - name: projects
    label: Portfolio
    path: src/content/projects
    type: collection
    format: yaml-frontmatter
    view:
      fields: [title, year, kind, lang]
      primary: title
    fields:
      - { name: id, label: ID, type: string }
      - { name: title, label: Titre, type: string }
      - { name: kind, label: Type, type: string }
      - { name: year, label: Année, type: number }
      - { name: lang, label: Langues, type: string }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: desc, label: Description, type: text }
      - { name: seed, label: Seed (waveform), type: number }
      - { name: dur, label: Durée, type: string }
      - { name: featured, label: Mis en avant ?, type: boolean }
      - { name: video_url, label: "URL vidéo (mp4 ou .m3u8 HLS)", type: string, description: "Collez ici un lien .mp4 ou stream HLS. Affiché sur la page projet + preview au survol sur la home." }
      - { name: poster, label: "Chemin image poster (optionnel)", type: string, description: "Ex: /media/projects/mon-projet.jpg — utilisez npm run add-photo" }
      - name: samples
        label: Extraits sonores
        type: object
        list: true
        fields:
          - { name: title, label: Titre, type: string }
          - { name: artist, label: Légende, type: string }
          - { name: duration, label: Durée (sec), type: number }
          - { name: seed, label: Seed, type: number }
          - name: url
            label: "Chemin fichier audio"
            type: string
            description: "Ex: /media/samples/nom.mp3 — déposez le fichier via git"
      - { name: order, label: Ordre, type: number }
      - { name: body, label: Contenu détaillé, type: text }

  - name: posts
    label: Journal
    path: src/content/posts
    type: collection
    format: yaml-frontmatter
    view:
      fields: [title, date, tag]
      primary: title
    fields:
      - { name: id, label: Slug, type: string }
      - { name: tag, label: Catégorie, type: string }
      - { name: title, label: Titre, type: string }
      - { name: date, label: Date, type: string }
      - { name: excerpt, label: Extrait, type: text }
      - { name: read, label: Temps de lecture, type: string }
      - { name: featured, label: À la une ?, type: boolean }
      - { name: cover, label: "Chemin image de couverture", type: string, description: "Ex: /media/posts/mon-article.jpg — utilisez npm run add-photo" }
      - { name: order, label: Ordre, type: number }
      - { name: body, label: Contenu, type: text }

  - name: studios
    label: Studios
    path: src/content/studios
    type: collection
    format: yaml-frontmatter
    view:
      fields: [id, name]
      primary: name
    fields:
      - { name: id, label: "Identifiant (A/B/C/D)", type: string }
      - { name: name, label: Nom, type: string }
      - { name: spec, label: Spécialité, type: text }
      - { name: equip, label: Équipement, type: string, list: true }
      - { name: surface, label: Surface, type: string }
      - { name: rt60, label: RT60, type: string }
      - { name: thumbnail, label: "Photo principale (carte)", type: image, description: "Uploadez d'abord via dbprod-factory.pages.dev/upload, puis sélectionnez depuis la médiathèque. Si vide, utilise la 1ère vue 360°." }
      - { name: panorama, label: "Image 360° (vue unique — équirectangulaire 2:1)", type: image, description: "Uploadez d'abord via /upload, puis sélectionnez depuis la médiathèque." }
      - name: panoramas
        label: "Vues 360° multiples"
        description: "Ajoutez plusieurs vues 360°. Uploadez d'abord via dbprod-factory.pages.dev/upload"
        type: object
        list: true
        fields:
          - { name: label, label: "Nom de la vue (ex. Régie, Cabine)", type: string }
          - { name: url, label: "Image panoramique", type: image }
      - { name: photo, label: "Photo normale (fallback)", type: image }
      - { name: order, label: Ordre, type: number }

  - name: voices
    label: Banque de voix
    path: src/content/voices
    type: collection
    format: yaml-frontmatter
    view:
      fields: [name, gender, register]
      primary: name
    fields:
      - { name: id, label: ID (slug), type: string }
      - { name: name, label: Nom du comédien, type: string }
      - name: gender
        label: Genre
        type: select
        options:
          values: [F, M]
      - { name: languages, label: Langues, type: string, list: true }
      - { name: register, label: Registre, type: string }
      - { name: tags, label: Tags, type: string, list: true }
      - name: sample_url
        label: "Extrait audio (mp3)"
        type: file
        description: "Uploadez d'abord via dbprod-factory.pages.dev/upload (dossier voices), puis sélectionnez depuis la médiathèque."
        options:
          extensions: [mp3, wav, m4a]
          path: public/media/voices
      - { name: duration, label: Durée (sec), type: number }
      - { name: seed, label: Seed (waveform), type: number }
      - { name: photo, label: "Photo", type: image, description: "Uploadez d'abord via dbprod-factory.pages.dev/upload (dossier voices), puis sélectionnez." }
      - { name: order, label: Ordre, type: number }
      - { name: body, label: Bio, type: text }

  - name: faq
    label: FAQ
    path: src/content/faq
    type: collection
    format: yaml-frontmatter
    view:
      fields: [title]
      primary: title
    fields:
      - { name: title, label: Catégorie, type: string }
      - name: items
        label: Questions/Réponses
        type: object
        list: true
        fields:
          - { name: q, label: Question, type: string }
          - { name: a, label: Réponse, type: text }
      - { name: order, label: Ordre, type: number }
